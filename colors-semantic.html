<!DOCTYPE html><html><head>

<meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:18px;background:#fff;font-family:var(--font-sans);box-sizing:border-box}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:12px}
.grad{position:relative;height:115px;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(15,33,44,.08),0 10px 22px rgba(15,33,44,.1);background:#fdfaf3}
.grad .label{position:absolute;left:12px;top:10px;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:rgba(16,32,45,.62);z-index:3}
.grad .sub{position:absolute;left:12px;bottom:10px;font-size:10px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:rgba(16,32,45,.55);z-index:3}
.blob{position:absolute;border-radius:50%;filter:blur(28px);mix-blend-mode:multiply;opacity:.85}
.grad.dark{background:#0a1220}
.grad.dark .label,.grad.dark .sub{color:rgba(236,244,246,.7)}
.grad.dark .blob{mix-blend-mode:screen;opacity:.9}

/* 01 Golden Horizon — cream base, gold + navy blobs */
.g1 .b1{left:-10%;top:-30%;width:70%;height:140%;background:#f0bf55}
.g1 .b2{right:-15%;top:10%;width:60%;height:120%;background:#e2a93a}
.g1 .b3{left:30%;bottom:-40%;width:50%;height:100%;background:#c3912e}

/* 02 Navy Dawn — cream base, gold + navy mix */
.g2 .b1{left:-5%;top:20%;width:55%;height:110%;background:#2a3d5e}
.g2 .b2{right:-10%;top:-20%;width:55%;height:120%;background:#5a7ab0}
.g2 .b3{left:40%;bottom:-30%;width:45%;height:90%;background:#e2a93a}

/* 03 Brand Core — navy + gold, tight composition */
.g3 .b1{left:10%;top:-20%;width:55%;height:110%;background:#253551}
.g3 .b2{right:5%;top:20%;width:45%;height:95%;background:#d29a2e}
.g3 .b3{left:45%;bottom:-30%;width:35%;height:75%;background:#0d1729}

/* 04 Midnight Capital — dark base, gold + steel highlights */
.g4 .b1{left:-10%;top:-20%;width:55%;height:110%;background:#3a5a8a}
.g4 .b2{right:-5%;top:30%;width:50%;height:100%;background:#d29a2e}
.g4 .b3{left:35%;bottom:-35%;width:40%;height:85%;background:#7aa0d0}

/* 05 Gold Rush — dark base, multiple gold intensities */
.g5 .b1{left:-10%;top:-25%;width:55%;height:115%;background:#c3912e}
.g5 .b2{right:-10%;top:15%;width:55%;height:110%;background:#f2c968}
.g5 .b3{left:40%;bottom:-30%;width:40%;height:85%;background:#8a6314}

/* 06 Deep Navy — dark base, cool blues */
.g6 .b1{left:-15%;top:-20%;width:60%;height:115%;background:#5a7ab0}
.g6 .b2{right:-10%;top:25%;width:50%;height:95%;background:#2a3d5e}
.g6 .b3{left:35%;bottom:-30%;width:45%;height:90%;background:#a7c3e3}
</style></head><body data-cc-id="cc-1" style="cursor: crosshair; background-color: rgb(255, 255, 255);">
<div class="row">
  <div class="grad g1"><span class="label">01 · Golden Horizon</span><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="sub">gold + warm cream</span></div>
  <div class="grad g2"><span class="label">02 · Navy Dawn</span><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="sub">navy + gold accent</span></div>
  <div class="grad g3"><span class="label">03 · Brand Core</span><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="sub">navy + gold on cream</span></div>
</div>
<div class="row">
  <div class="grad g4 dark"><span class="label">04 · Midnight Capital</span><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="sub">steel blue + gold</span></div>
  <div class="grad g5 dark"><span class="label">05 · Gold Rush</span><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="sub">layered gold tones</span></div>
  <div class="grad g6 dark"><span class="label">06 · Deep Navy</span><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="sub">navy spectrum</span></div>
</div>

</body></html>
