<template>
    <div class="ol-container">

        <!-- Toolbar -->
        <div class="ol-toolbar">
            <div class="ol-search-wrap">
                <svg class="ol-search-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="4.5" stroke="#9ca3af" stroke-width="1.4"/>
                    <path d="M10 10l3.5 3.5" stroke="#9ca3af" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                <input class="ol-search" type="search" placeholder="Search by account, ID, stage, owner, dealer…" oninput={handleSearch}/>
            </div>
            <div class="ol-filters">
                <select class="ol-select" data-key="stage" onchange={handleFilterChange}>
                    <template for:each={stageOptions} for:item="opt">
                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                    </template>
                </select>
                <select class="ol-select" data-key="type" onchange={handleFilterChange}>
                    <template for:each={typeOptions} for:item="opt">
                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                    </template>
                </select>
            </div>

            <!-- Column picker -->
            <div class="ol-col-picker-wrap">
                <button class={colBtnClass} onclick={handleToggleColPicker} title="Show/hide columns">
                    <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <rect x="1" y="3" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.3"/>
                        <rect x="6" y="3" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.3"/>
                        <rect x="11" y="3" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.3"/>
                    </svg>
                    Columns
                </button>
                <template if:true={showColPicker}>
                    <div class="ol-col-overlay" onclick={handleCloseColPicker}></div>
                    <div class="ol-col-panel" onclick={handleColPickerPanelClick}>
                        <div class="ol-col-panel-header">Columns</div>
                        <div class="ol-col-search-wrap">
                            <input class="ol-col-search" type="search" placeholder="Filter fields…" oninput={handleColFilter}/>
                        </div>
                        <div class="ol-col-list">
                            <template for:each={colPickerOptions} for:item="col">
                                <label key={col.apiName} class="ol-col-item">
                                    <input type="checkbox" checked={col.checked} data-field={col.apiName} onchange={handleColToggle}/>
                                    {col.label}
                                </label>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <span class="ol-count">{rowCount}</span>
        </div>

        <!-- Bulk action bar -->
        <template if:true={hasSelection}>
            <div class="ol-bulk-bar">
                <span class="ol-bulk-count">{selectionLabel}</span>
                <div class="ol-bulk-actions">
                    <button class="ol-bulk-btn" onclick={handleBulkStage}>
                        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                            <path d="M2 4h12M2 8h8M2 12h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                        Change Stage
                    </button>
                    <button class="ol-bulk-btn" onclick={handleBulkOwner}>
                        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                            <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.4"/>
                            <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                        Reassign Owner
                    </button>
                    <button class="ol-bulk-btn ol-bulk-btn-export" onclick={handleExport}>
                        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                            <path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12v1a1 1 0 001 1h10a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                        </svg>
                        Export CSV
                    </button>
                    <button class="ol-bulk-btn ol-bulk-btn-danger" onclick={handleBulkDelete}>
                        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                            <path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 9a1 1 0 001 1h6a1 1 0 001-1l1-9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Delete
                    </button>
                </div>
                <button class="ol-bulk-clear" onclick={handleClearSelection} title="Clear selection">✕</button>
            </div>
        </template>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="ol-state">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>

        <!-- Error -->
        <template if:true={error}>
            <div class="ol-state ol-error">Failed to load opportunities.</div>
        </template>

        <!-- Empty -->
        <template if:true={isEmpty}>
            <div class="ol-state">No opportunities match your search.</div>
        </template>

        <!-- Table -->
        <template if:false={isLoading}>
            <template if:false={error}>
                <div class="ol-table-wrap">
                    <table class="ol-table">
                        <thead>
                            <tr>
                                <th class="ol-th ol-th-check">
                                    <input type="checkbox" checked={allSelected} onchange={handleSelectAll}/>
                                </th>
                                <template for:each={visibleColumns} for:item="col">
                                    <th key={col.apiName} class={col.thClass} data-field={col.apiName} onclick={handleSort}>
                                        {col.label}<span class="ol-sort-icon">{col.sortIcon}</span>
                                    </th>
                                </template>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={rowsWithSelection} for:item="row">
                                <tr key={row.Id} class={row.rowClass} data-id={row.Id} onclick={handleRowClick}>
                                    <td class="ol-td ol-td-check" onclick={handleCheckCellClick}>
                                        <input type="checkbox" checked={row.isSelected} data-id={row.Id} onchange={handleSelectRow}/>
                                    </td>
                                    <template for:each={row.cells} for:item="cell">
                                        <td key={cell.field} class={cell.tdClass}>
                                            <template if:true={cell.isDot}>
                                                <span class="ol-dot" style={cell.dotStyle}></span>
                                            </template>
                                            <template if:true={cell.isBadge}>
                                                <span class="ol-badge" style={cell.badgeStyle}>{cell.value}</span>
                                            </template>
                                            <template if:false={cell.isBadge}>
                                                {cell.value}
                                            </template>
                                        </td>
                                    </template>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
        </template>

        <!-- Change Stage Modal -->
        <template if:true={showStageModal}>
            <div class="ol-modal-overlay" onclick={handleModalClose}>
                <div class="ol-modal" onclick={handleCheckCellClick}>
                    <h3 class="ol-modal-title">Change Stage</h3>
                    <p class="ol-modal-body">Apply to {selectionCount} selected record{selectionCount === 1 ? '' : 's'}.</p>
                    <select class="ol-modal-select" onchange={handleModalStageChange}>
                        <template for:each={stageSelectOptions} for:item="opt">
                            <option key={opt.value} value={opt.value}>{opt.label}</option>
                        </template>
                    </select>
                    <div class="ol-modal-actions">
                        <button class="ol-modal-btn ol-modal-btn-primary" disabled={isSaving} onclick={handleStageApply}>{applyButtonLabel}</button>
                        <button class="ol-modal-btn ol-modal-btn-secondary" disabled={isSaving} onclick={handleModalClose}>Cancel</button>
                    </div>
                </div>
            </div>
        </template>

        <!-- Reassign Owner Modal -->
        <template if:true={showOwnerModal}>
            <div class="ol-modal-overlay" onclick={handleModalClose}>
                <div class="ol-modal" onclick={handleCheckCellClick}>
                    <h3 class="ol-modal-title">Reassign Owner</h3>
                    <p class="ol-modal-body">Apply to {selectionCount} selected record{selectionCount === 1 ? '' : 's'}.</p>
                    <input class="ol-modal-input" type="search" placeholder="Filter users…" oninput={handleUserFilterChange}/>
                    <select class="ol-modal-select ol-modal-select-tall" onchange={handleModalOwnerChange}>
                        <template for:each={filteredUserOptions} for:item="opt">
                            <option key={opt.value} value={opt.value}>{opt.label}</option>
                        </template>
                    </select>
                    <div class="ol-modal-actions">
                        <button class="ol-modal-btn ol-modal-btn-primary" disabled={isSaving} onclick={handleOwnerApply}>{applyButtonLabel}</button>
                        <button class="ol-modal-btn ol-modal-btn-secondary" disabled={isSaving} onclick={handleModalClose}>Cancel</button>
                    </div>
                </div>
            </div>
        </template>

        <!-- Delete Confirmation Modal -->
        <template if:true={showDeleteModal}>
            <div class="ol-modal-overlay" onclick={handleModalClose}>
                <div class="ol-modal" onclick={handleCheckCellClick}>
                    <h3 class="ol-modal-title ol-modal-title-danger">Delete Opportunities?</h3>
                    <p class="ol-modal-body">{deleteMessage}</p>
                    <div class="ol-modal-actions">
                        <button class="ol-modal-btn ol-modal-btn-danger" disabled={isSaving} onclick={handleDeleteConfirm}>{deleteButtonLabel}</button>
                        <button class="ol-modal-btn ol-modal-btn-secondary" disabled={isSaving} onclick={handleModalClose}>Cancel</button>
                    </div>
                </div>
            </div>
        </template>

        <a class="ol-export-link"></a>

    </div>
</template>
