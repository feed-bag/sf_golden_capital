<template>
    <lightning-card title="Checklist" icon-name="standard:task2">
        <div slot="actions">
            <lightning-button
                label="Add Item"
                icon-name="utility:add"
                onclick={handleOpenAddModal}
            ></lightning-button>
        </div>

        <div class="slds-var-p-around_small">

            <!-- Loading state -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>

            <!-- Error state -->
            <template if:true={error}>
                <div class="slds-text-color_error slds-var-p-around_small">
                    An error occurred loading the checklist.
                </div>
            </template>

            <!-- Empty state -->
            <template if:true={isEmpty}>
                <div class="slds-illustration slds-illustration_small slds-var-p-around_medium">
                    <p class="slds-text-body_regular slds-text-color_weak">
                        No checklist items yet. Items will be added automatically when the opportunity reaches a trigger stage, or you can add them manually.
                    </p>
                </div>
            </template>

            <!-- Checklist groups -->
            <template if:true={hasGroups}>
                <template for:each={groups} for:item="group">
                    <div key={group.templateId} class="checklist-group slds-var-m-bottom_small">
                        <!-- Group header -->
                        <div class="group-header slds-grid slds-grid_align-spread slds-var-p-vertical_x-small slds-var-p-horizontal_small" onclick={handleToggleSection} data-template-id={group.templateId}>
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-icon
                                    icon-name={group.chevronIcon}
                                    size="xx-small"
                                    class="slds-var-m-right_x-small"
                                ></lightning-icon>
                                <span class="slds-text-heading_small">{group.templateName}</span>
                            </div>
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <span class={group.progressClass}>
                                    {group.completeCount}/{group.totalCount}
                                </span>
                                <template if:true={group.allComplete}>
                                    <lightning-icon
                                        icon-name="utility:check"
                                        size="xx-small"
                                        variant="success"
                                        class="slds-var-m-left_x-small"
                                    ></lightning-icon>
                                </template>
                            </div>
                        </div>

                        <!-- Group items -->
                        <template if:true={group.isExpanded}>
                            <ul class="slds-has-dividers_top-space group-items">
                                <template for:each={group.items} for:item="item">
                                    <li key={item.Id} class="slds-item slds-grid slds-grid_vertical-align-center slds-grid_align-spread slds-var-p-horizontal_small slds-var-p-vertical_xx-small checklist-item">
                                        <div class="slds-grid slds-grid_vertical-align-center slds-col">
                                            <lightning-input
                                                type="checkbox"
                                                checked={item.Complete__c}
                                                data-item-id={item.Id}
                                                onchange={handleToggleComplete}
                                                label={item.Name__c}
                                                class="item-checkbox"
                                            ></lightning-input>
                                        </div>
                                        <div class="slds-grid slds-grid_vertical-align-center slds-no-flex">
                                            <template if:true={item.Dealer_Visible__c}>
                                                <lightning-badge label="Dealer" class="dealer-badge slds-var-m-right_x-small"></lightning-badge>
                                            </template>
                                            <template if:true={item.Due_Date__c}>
                                                <span class={item.dueDateClass}>
                                                    {item.formattedDueDate}
                                                </span>
                                            </template>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                variant="bare"
                                                size="small"
                                                alternative-text="Delete"
                                                data-item-id={item.Id}
                                                onclick={handleDeleteItem}
                                                class="slds-var-m-left_x-small delete-btn"
                                            ></lightning-button-icon>
                                        </div>
                                    </li>
                                </template>
                            </ul>

                            <!-- Add item to this section -->
                            <div class="slds-var-p-horizontal_small slds-var-p-top_xx-small">
                                <lightning-button
                                    label="Add item"
                                    icon-name="utility:add"
                                    variant="base"
                                    size="small"
                                    data-template-id={group.templateId}
                                    onclick={handleOpenAddModal}
                                    class="add-section-btn"
                                ></lightning-button>
                            </div>
                        </template>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>

    <!-- Add Item Modal -->
    <template if:true={showAddModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" onclick={handleCloseAddModal}>
                        <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">Add Checklist Item</h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_medium">
                    <lightning-input
                        label="Item Name"
                        value={newItemName}
                        onchange={handleNewItemNameChange}
                        required
                        placeholder="Enter item name..."
                    ></lightning-input>
                    <lightning-input
                        type="date"
                        label="Due Date"
                        value={newItemDueDate}
                        onchange={handleNewItemDueDateChange}
                        class="slds-var-m-top_small"
                    ></lightning-input>
                    <lightning-input
                        type="checkbox"
                        label="Visible to Dealer"
                        checked={newItemDealerVisible}
                        onchange={handleNewItemDealerVisibleChange}
                        class="slds-var-m-top_small"
                    ></lightning-input>
                    <template if:true={hasTemplates}>
                        <lightning-combobox
                            label="Section"
                            value={newItemTemplateId}
                            options={templateOptions}
                            onchange={handleNewItemTemplateChange}
                            class="slds-var-m-top_small"
                        ></lightning-combobox>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleCloseAddModal}></lightning-button>
                    <lightning-button
                        label="Add Item"
                        variant="brand"
                        onclick={handleSaveNewItem}
                        disabled={isSaving}
                    ></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
